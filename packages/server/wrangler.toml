name = "worker-blog-server"
main = "src/index.ts"
compatibility_date = "2025-10-08"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Workers settings
workers_dev = true

[assets]
directory = "../admin/dist"
binding = "ASSETS"
run_worker_first = ["/api/*", "/files/*"]

# D1 Database
[[d1_databases]]
binding = "DB"
# database_name = "worker-blog-worktree-main"
# database_id = "eebcf805-a93f-4ac4-8de3-d26434c7c8bd" # Run: wrangler d1 create worker-blog-db
database_name = "worker-blog-worktree-main"
database_id = "c77fafd9-ddba-4dba-8ce2-508a8b07df08"
migrations_dir = "./migrations"

# R2 Bucket for media storage
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "worker-blog-media"

# KV Cache (using CI namespace)
[[kv_namespaces]]
binding = "CACHE_KV"
id = "a16f8246fc294d809c90b0fb2df6d363"

# Environment variables
[vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "http://localhost:8787"

# Production environment
[env.production]
name = "worker-blog-server-production"
vars = { ENVIRONMENT = "production" }

# Observability
[observability]
enabled = true
