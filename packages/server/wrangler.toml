name = "worker-blog-server"
main = "src/index.ts"
compatibility_date = "2025-10-08"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Workers settings
workers_dev = true

[assets]
directory = "../admin/dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/", "/admin", "/admin/*", "/api/*", "/favicon.svg", "/files/*"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "worker-blog-db"
database_id = "YOUR_DATABASE_ID" # Run: wrangler d1 create worker-blog-db
migrations_dir = "./migrations"

# R2 Bucket for media storage
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "worker-blog-media"

# KV Cache (using CI namespace)
[[kv_namespaces]]
binding = "CACHE_KV"
id = "a16f8246fc294d809c90b0fb2df6d363"

# Environment variables
[vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "http://localhost:8787"

# Production environment
[env.production]
name = "worker-blog-server-production"
vars = { ENVIRONMENT = "production" }

# Observability
[observability]
enabled = true
